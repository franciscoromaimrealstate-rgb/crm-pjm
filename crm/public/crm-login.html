<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJM CRM — Acceso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a1f3c;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.card{background:#0f2647;border:1px solid rgba(192,200,216,.15);border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:32px}
.logo-box{width:200px;margin:0 auto 14px;display:block;background:#fff;border-radius:16px;padding:16px 20px}
.logo h1{font-size:20px;font-weight:700;color:#fff;line-height:1.3}
.logo p{font-size:12px;color:rgba(192,200,216,.5);margin-top:5px;letter-spacing:.06em;text-transform:uppercase}
.err{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;border-radius:8px;padding:11px 14px;font-size:13px;margin-bottom:16px;display:none}
.form-group{margin-bottom:18px}
label{display:block;font-size:11px;font-weight:600;color:rgba(192,200,216,.6);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(192,200,216,.2);border-radius:8px;padding:12px 16px;color:#fff;font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
input:focus{border-color:#c0c8d8;background:rgba(255,255,255,.09)}
input::placeholder{color:rgba(192,200,216,.3)}
.btn{width:100%;background:#c0c8d8;color:#0a1f3c;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;font-family:inherit}
.btn:hover{background:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.back{text-align:center;margin-top:20px}
.back a{color:rgba(192,200,216,.5);font-size:12px;text-decoration:none;transition:color .2s}
.back a:hover{color:#c0c8d8}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img class="logo-box" src="/logo-pjm.png" alt="PJM">
    <h1>Pólizas Jurídicas<br>Monterrey</h1>
    <p>Portal de asesores</p>
  </div>
  <div class="err" id="err"></div>
  <div class="form-group">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="tu@correo.com" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
  </div>
  <div class="form-group" id="sobre-group" style="display:none">
    <label>Sobrecontraseña</label>
    <input type="password" id="sobre" placeholder="Tu PIN de seguridad" autocomplete="off">
  </div>
  <button class="btn" id="btn" onclick="login()">Entrar al CRM</button>
  <div class="back"><a href="/">← Volver a polizasjuridicasmonterrey.com</a></div>
</div>
<script>
  document.getElementById('sobre').addEventListener('keydown', e => e.key==='Enter' && login());
  document.getElementById('pass').addEventListener('keydown', e => e.key==='Enter' && login());
  if (localStorage.getItem('pjm_token')) window.location.href = '/crm.html';
  async function login() {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('pass').value;
    const sobre = document.getElementById('sobre').value;
    const btn   = document.getElementById('btn');
    const err   = document.getElementById('err');
    err.style.display = 'none';
    if (!email || !pass) { showErr('Ingresa tu correo y contraseña'); return; }
    btn.disabled = true; btn.textContent = 'Verificando...';
    try {
      const body = { email, password: pass };
      if (sobre) body.sobre_password = sobre;
      const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await r.json();
      if (!r.ok) {
        if (data.error === 'sobre_password_requerida') {
          document.getElementById('sobre-group').style.display = '';
          showErr(data.mensaje || 'Ingresa tu sobrecontraseña');
          document.getElementById('sobre').focus();
          return;
        }
        showErr(data.error || 'Credenciales incorrectas'); return;
      }
      localStorage.setItem('pjm_token', data.token);
      localStorage.setItem('pjm_user', JSON.stringify(data.user));
      window.location.href = '/crm.html';
    } catch { showErr('Error de conexión. Intenta de nuevo.'); }
    finally { btn.disabled=false; btn.textContent='Entrar al CRM'; }
  }
  function showErr(msg) {
    const e = document.getElementById('err');
    e.textContent = msg; e.style.display = 'block';
    document.getElementById('btn').disabled = false;
    document.getElementById('btn').textContent = 'Entrar al CRM';
  }
</script>
</body>
</html>
